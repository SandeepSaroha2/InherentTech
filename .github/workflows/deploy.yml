# Deployment workflow — currently running locally via Cloudflare Tunnel
# Apps are served with: npx turbo dev --filter=<app>
# No automated CI/CD deployment configured yet.
# To set up automated deployment, update this file with your hosting provider.

name: Deploy (manual/local)

on:
  workflow_dispatch:
    inputs:
      note:
        description: 'Deployment note'
        required: false

jobs:
  no-op:
    name: No automated deployment configured
    runs-on: ubuntu-latest
    steps:
      - name: Info
        run: |
          echo "Apps are currently running locally."
          echo "To deploy, restart the local dev server after pulling latest changes."
          echo "Run: git pull && npx turbo dev --filter=@inherenttech/ats"
