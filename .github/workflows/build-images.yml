name: Build & Push Images

# Build container images for all 5 InherentTech apps and push to GHCR.
# Tagging strategy:
#   push to main         → :staging  + :sha-<short>
#   push to release/*    → :beta     + :sha-<short>
#   push tag v*.*.*      → :production + :v*.*.* + :sha-<short>
#   workflow_dispatch    → :<custom-tag-input>

on:
  push:
    branches: [main, "release/*"]
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (default: workflow-run-<id>)'
        required: false
      apps:
        description: 'Apps to build (comma-separated). Default: all five.'
        required: false
        default: 'ats,aiocrm,web,kudodoc,jobplatform'

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}/inherenttech

jobs:
  resolve:
    name: Resolve tags
    runs-on: ubuntu-latest
    outputs:
      tag:  ${{ steps.t.outputs.tag }}
      apps: ${{ steps.t.outputs.apps }}
      sha7: ${{ steps.t.outputs.sha7 }}
    steps:
      - id: t
        run: |
          SHA7="${GITHUB_SHA::7}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag || format('manual-{0}', github.run_id) }}"
            APPS="${{ github.event.inputs.apps || 'ats,aiocrm,web,kudodoc,jobplatform' }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v*.*.* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            APPS="ats,aiocrm,web,kudodoc,jobplatform"
          elif [[ "${GITHUB_REF}" == refs/heads/release/* ]]; then
            TAG="beta"
            APPS="ats,aiocrm,web,kudodoc,jobplatform"
          else
            TAG="staging"
            APPS="ats,aiocrm,web,kudodoc,jobplatform"
          fi
          echo "tag=${TAG}"   >> $GITHUB_OUTPUT
          echo "apps=${APPS}" >> $GITHUB_OUTPUT
          echo "sha7=${SHA7}" >> $GITHUB_OUTPUT
          echo "→ tag=${TAG}  apps=${APPS}  sha7=${SHA7}"

  build:
    name: Build ${{ matrix.app }}
    needs: resolve
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [ats, aiocrm, web, kudodoc, jobplatform]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Skip if not requested
        id: filter
        run: |
          if [[ ",${{ needs.resolve.outputs.apps }}," == *",${{ matrix.app }},"* ]]; then
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "build=false" >> $GITHUB_OUTPUT
            echo "Skipping ${{ matrix.app }} — not in requested apps list"
          fi

      - if: steps.filter.outputs.build == 'true'
        uses: actions/checkout@v4
        with: { fetch-depth: 1 }

      - if: steps.filter.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - if: steps.filter.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - if: steps.filter.outputs.build == 'true'
        name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            APP=${{ matrix.app }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.app }}:${{ needs.resolve.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.app }}:sha-${{ needs.resolve.outputs.sha7 }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.app }}:cache
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.app }}:cache,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}

  summary:
    name: Summary
    needs: [resolve, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: |
          echo "## Built images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tag: \`${{ needs.resolve.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "SHA: \`${{ needs.resolve.outputs.sha7 }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| App | Tag | Pull |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-----|------|" >> $GITHUB_STEP_SUMMARY
          IFS=',' read -ra APPS <<< "${{ needs.resolve.outputs.apps }}"
          for app in "${APPS[@]}"; do
            IMG="${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/$app:${{ needs.resolve.outputs.tag }}"
            echo "| $app | \`${{ needs.resolve.outputs.tag }}\` | \`docker pull $IMG\` |" >> $GITHUB_STEP_SUMMARY
          done
