name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
  DIRECT_URL: "postgresql://fake:fake@localhost:5432/fake"
  SUPABASE_URL: "https://fake.supabase.co"
  SUPABASE_ANON_KEY: "fake"
  SUPABASE_SERVICE_KEY: "fake"
  NEXT_PUBLIC_SUPABASE_URL: "https://fake.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "fake"
  STRIPE_SECRET_KEY: "sk_test_fake"
  STRIPE_PUBLISHABLE_KEY: "pk_test_fake"
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_fake"
  RESEND_API_KEY: "re_fake"
  ANTHROPIC_API_KEY: "fake"
  RETELL_API_KEY: "fake"
  VONAGE_API_KEY: "fake"
  VONAGE_API_SECRET: "fake"

jobs:
  prisma-validate:
    name: Prisma Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Validate Prisma schema
        run: npx prisma validate --schema=packages/db/prisma/schema.prisma
      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/db/prisma/schema.prisma

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [prisma-validate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/db/prisma/schema.prisma
      - name: Run linter
        run: npx turbo lint

  typecheck:
    name: Type Check & Build
    runs-on: ubuntu-latest
    needs: [prisma-validate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/db/prisma/schema.prisma
      - name: Build all packages
        run: npx turbo build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/db/prisma/schema.prisma
      - name: Run tests
        run: npx turbo test
